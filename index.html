<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack - Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card text-center">
            <div class="login-logo">
                <i class="bi bi-lightning-charge-fill"></i>
            </div>
            <h1 class="login-title mb-1">FitTrack</h1>
            <p class="login-subtitle mb-4">Nhật ký tập luyện &amp; theo dõi tiến độ sức khỏe</p>
            <form id="loginForm">
                <div class="mb-3 text-start">
                    <input type="text" class="form-control" id="username" placeholder="Nhập tên tài khoản" required>
                </div>
                <div class="mb-3 text-start">
                    <div class="input-group-glass">
                        <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu của bạn" autocomplete="current-password" required>
                        <i class="bi bi-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>
                <div class="error-feedback text-start" id="loginError"></div>
                <button type="submit" class="btn btn-fit-primary w-100 mt-3" id="loginBtn">
                    <span class="btn-text">Đăng nhập</span>
                    <span class="spinner-border spinner-border-sm d-none ms-2" id="loginSpinner"></span>
                </button>
            </form>
            <p class="text-white-50 small mt-4 mb-0">© 2026 FitTrackHAVA.</p>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        /* =====================================
           QUẢN LÝ ĐĂNG NHẬP
        ===================================== */
        $(function () {
            const session = JSON.parse(localStorage.getItem(CONFIG.SESSION_KEY) || "null");
            if (session && session.role === "admin") {
                window.location.href = "admin.html";
                return;
            }
            if (session && session.role === "user") {
                window.location.href = "user.html";
                return;
            }
            $("#togglePassword").on("click", function () {
                const input = $("#password");
                const isPassword = input.attr("type") === "password";
                input.attr("type", isPassword ? "text" : "password");
                $(this).toggleClass("bi-eye bi-eye-slash");
            });
            $("#loginForm").on("submit", function (e) {
                e.preventDefault();
                const username = $("#username").val().trim();
                const password = $("#password").val().trim();
                $("#loginError").removeClass("d-block").text("");
                if (username === "" || password === "") {
                    $("#loginError").addClass("d-block").text("Vui lòng nhập đầy đủ tên đăng nhập và mật khẩu");
                    return;
                }
                $("#loginBtn").prop("disabled", true);
                $("#loginSpinner").removeClass("d-none");
                FitTrackAPI.verifyLogin(username, password)
                    .then(function (result) {
                        if (result && result.success && result.role) {
                            const session = {
                                role: result.role,
                                username: username, 
                                loginTime: new Date().toISOString()
                            };
                            localStorage.setItem(CONFIG.SESSION_KEY, JSON.stringify(session));
                            if (result.role === "admin") {
                                window.location.href = "admin.html";
                            } else {
                                window.location.href = "user.html";
                            }
                        } else {
                            $("#loginError").addClass("d-block").text("Tên đăng nhập hoặc mật khẩu không đúng");
                        }
                    })
                    .catch(function (err) {
                        $("#loginError").addClass("d-block").text(err.message || "Tên đăng nhập hoặc mật khẩu không đúng");
                    })
                    .finally(function () {
                        $("#loginBtn").prop("disabled", false);
                        $("#loginSpinner").addClass("d-none");
                    });
            });
        });
    </script>
</body>
</html>
