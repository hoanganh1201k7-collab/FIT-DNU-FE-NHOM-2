<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack - Chinh Phục Bản Thân</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>

    <nav class="navbar navbar-expand-lg fixed-top navbar-glass py-3" id="mainNav">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#"><i class="bi bi-activity text-primary"></i> FitTrack</a>
            <a href="admin.html" class="btn btn-outline-dark rounded-pill px-4 fw-semibold border-2 d-none d-sm-block">Quản trị viên</a>
        </div>
    </nav>

    <section class="container pt-5 mt-5">
        <div class="row align-items-center mt-4 mb-5 pb-4 border-bottom border-light">
            <div class="col-lg-7 text-center text-lg-start mb-5 mb-lg-0">
                <h1 class="display-3 fw-bolder mb-3">Định Hình Lại <br><span class="text-gradient">Phiên Bản Tốt Nhất.</span></h1>
                <p class="lead text-secondary mb-4 col-lg-10">Theo dõi tiến trình, phân tích dữ liệu và vượt qua mọi giới hạn thể chất của bạn với FitTrack.</p>
                <div class="d-flex gap-3 justify-content-center justify-content-lg-start">
                    <button class="btn btn-gradient px-5 py-3 fs-5" onclick="document.getElementById('formSection').scrollIntoView({behavior:'smooth'})">Bắt đầu ngay</button>
                    <button class="btn btn-light rounded-pill px-5 py-3 fs-5 fw-semibold shadow-sm" onclick="document.getElementById('explore').scrollIntoView({behavior:'smooth'})">Xem thống kê</button>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="premium-card p-4">
                    <h5 class="fw-bold mb-4">Tiến Độ Tuần Này</h5>
                    <div class="d-flex align-items-center gap-4 mb-4">
                        <div class="circular-progress" id="weeklyProgress">
                            <span class="circular-value text-dark">0%</span>
                        </div>
                        <div>
                            <h2 class="fw-bolder mb-0" id="statCalories">0</h2>
                            <p class="text-muted fw-medium mb-0">/ 5000 kcal mục tiêu</p>
                        </div>
                    </div>
                    <div class="row g-3 text-center">
                        <div class="col-6">
                            <div class="p-3 bg-light rounded-4">
                                <h4 class="fw-bold mt-2 mb-0" id="statWorkouts">0</h4>
                                <small class="text-muted fw-semibold">Buổi tập</small>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 bg-light rounded-4">
                                <h4 class="fw-bold mt-2 mb-0"><span id="statDuration">0</span>h</h4>
                                <small class="text-muted fw-semibold">Thời lượng</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="container mb-5" id="formSection">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="premium-card p-4 p-md-5 shadow-lg">
                    <h4 class="fw-bold mb-4"><i class="bi bi-pencil-square text-primary me-2"></i>Ghi lại buổi tập hôm nay</h4>
                    <form id="formAddWorkout">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-semibold">Ngày tập</label>
                                <input type="date" class="form-control form-control-lg bg-light border-0" id="workoutDate" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted fw-semibold">Bài tập</label>
                                <select class="form-select form-control-lg bg-light border-0" id="workoutExercise" required>
                                    <option value="">-- Đang tải... --</option>
                                </select>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label text-muted fw-semibold">Thời gian (phút)</label>
                                <input type="number" class="form-control form-control-lg bg-light border-0" id="workoutDuration" placeholder="Ví dụ: 30" required min="1">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label text-muted fw-semibold">Ghi chú thành tích</label>
                                <textarea class="form-control bg-light border-0" id="workoutNote" rows="2" placeholder="Bạn cảm thấy thế nào?"></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-gradient w-100 py-3 fs-5">Lưu Buổi Tập</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <section class="container mb-5 pb-5" id="explore">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <h3 class="fw-bolder mb-0">Lịch sử hoạt động</h3>
            <div class="d-flex gap-2 flex-wrap">
                <input type="text" id="searchInput" class="form-control rounded-pill shadow-sm border-0 px-4" placeholder="Tìm kiếm..." style="width: 250px;">
                <select id="filterMuscle" class="form-select rounded-pill shadow-sm border-0 fw-medium" style="width: 160px;">
                    <option value="all">Tất cả nhóm cơ</option>
                    <option value="Cardio">Cardio</option>
                    <option value="Ngực">Ngực</option>
                    <option value="Chân">Chân</option>
                    <option value="Lưng">Lưng</option>
                    <option value="Tay">Tay</option>
                    <option value="Toàn thân">Toàn thân</option>
                </select>
            </div>
        </div>
        <div class="row g-4" id="workoutGrid"></div>
    </section>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
