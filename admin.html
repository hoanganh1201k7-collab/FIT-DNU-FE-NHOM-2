<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="toast-container position-fixed top-0 end-0 p-4" style="z-index: 1100">
        <div id="actionToast" class="toast align-items-center text-bg-dark border-0 rounded-3 shadow-lg" role="alert">
            <div class="d-flex">
                <div class="toast-body fw-medium" id="toastMessage">Thành công!</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="d-flex flex-column flex-md-row" style="min-height: 100vh;">
        <div class="admin-sidebar p-4 d-none d-md-flex flex-column text-white" style="width: 280px;">
            <h4 class="fw-bold mb-5"><i class="bi bi-activity text-primary"></i> FitTrack.</h4>
            <ul class="nav nav-pills flex-column gap-2">
                <li class="nav-item">
                    <a href="#" class="nav-link active bg-primary"><i class="bi bi-grid-1x2-fill me-2"></i> Bảng điều khiển</a>
                </li>
                <li class="nav-item mt-5 pt-5 border-top border-secondary">
                    <a href="index.html" class="nav-link text-white-50"><i class="bi bi-box-arrow-left me-2"></i> Về trang khách</a>
                </li>
            </ul>
        </div>

        <div class="flex-grow-1 p-4 p-lg-5">
            <h3 class="fw-bolder mb-4">Hệ thống Quản trị FitTrack</h3>

            <ul class="nav nav-tabs border-0 mb-4" id="adminTab" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active fw-bold border-0 bg-transparent" id="exercise-tab" data-bs-toggle="tab" data-bs-target="#exercise-pane">Danh mục Bài tập</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link fw-bold border-0 bg-transparent text-secondary" id="log-tab" data-bs-toggle="tab" data-bs-target="#log-pane">Nhật ký Người dùng</button>
                </li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="exercise-pane">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold mb-0">Thư viện bài tập chuẩn</h5>
                        <button class="btn btn-primary rounded-pill px-4 shadow-sm" id="btnOpenAddExercise"><i class="bi bi-plus-lg"></i> Thêm Bài Tập</button>
                    </div>
                    <div class="card bg-white shadow-sm border-0 rounded-4 overflow-hidden">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="px-4 py-3 text-muted">Tên bài tập</th>
                                        <th class="text-muted">Nhóm cơ</th>
                                        <th class="text-muted">Calo/Phút</th>
                                        <th class="px-4 text-end text-muted">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="exerciseTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="log-pane">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold mb-0">Dữ liệu tập luyện của user</h5>
                        <button class="btn btn-primary rounded-pill px-4 shadow-sm" id="btnOpenAddWorkout"><i class="bi bi-plus-lg"></i> Thêm Buổi Tập</button>
                    </div>
                    <div class="card bg-white shadow-sm border-0 rounded-4 overflow-hidden">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="px-4 py-3 text-muted">Ngày</th>
                                        <th class="text-muted">Bài tập</th>
                                        <th class="text-muted">Nhóm cơ</th>
                                        <th class="text-muted">Thời lượng</th>
                                        <th class="text-muted">Tổng Calo</th>
                                        <th class="px-4 text-end text-muted">Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody id="adminWorkoutTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="exerciseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header">
                    <h5 class="fw-bold" id="exModalTitle">Thiết kế Bài Tập</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="exerciseForm">
                        <input type="hidden" id="exEditId">
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="exName" required>
                            <label>Tên bài tập</label>
                        </div>
                        <div class="form-floating mb-3">
                            <select class="form-select" id="exMuscle" required>
                                <option value="Cardio">Cardio</option>
                                <option value="Ngực">Ngực</option>
                                <option value="Chân">Chân</option>
                                <option value="Lưng">Lưng</option>
                                <option value="Tay">Tay</option>
                                <option value="Toàn thân">Toàn thân</option>
                            </select>
                            <label>Nhóm cơ chính</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="number" class="form-control" id="exCal" required min="1">
                            <label>Calo tiêu hao / phút</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">Lưu Bài Tập</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="workoutModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header">
                    <h5 class="fw-bold" id="woModalTitle">Ghi nhận buổi tập</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="workoutForm">
                        <input type="hidden" id="woEditId">
                        <div class="form-floating mb-3">
                            <input type="date" class="form-control" id="woDate" required>
                            <label>Ngày tập</label>
                        </div>
                        <div class="form-floating mb-3">
                            <select class="form-select" id="woExercise" required></select>
                            <label>Loại bài tập</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="number" class="form-control" id="woDuration" required min="1">
                            <label>Thời lượng (phút)</label>
                        </div>
                        <div class="form-floating mb-4">
                            <textarea class="form-control" id="woNote" style="height: 100px"></textarea>
                            <label>Ghi chú</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">Lưu Dữ Liệu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
